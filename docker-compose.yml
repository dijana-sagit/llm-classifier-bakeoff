services:
  bakeoff:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-classifier-bakeoff:latest
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    working_dir: /app
    # Override at the CLI, e.g.:
    #   docker compose run --rm bakeoff python -m eval.run_eval --methods all
    #   docker compose run --rm bakeoff python -m analysis.reports
    command: ["python", "-m", "eval.run_eval", "--methods", "knn"]
